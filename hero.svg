<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="360" viewBox="0 0 1180 360" fill="none" role="img" aria-label="Mehmet Akif Sarı - Process Automation Developer">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#10B981"/>
      <animate attributeName="x1" values="0;0.4;0" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1;0.6;1" dur="8s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#0A1120"/>
    </linearGradient>
    <radialGradient id="glowA" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <clipPath id="round"><rect x="0" y="0" width="1180" height="360" rx="24"/></clipPath>
  </defs>

  <g clip-path="url(#round)">
    <!-- background -->
    <rect x="0" y="0" width="1180" height="360" fill="#030712"/>
    <circle cx="180" cy="90" r="260" fill="url(#glowB)">
      <animate attributeName="cy" values="90;140;90" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="980" cy="300" r="300" fill="url(#glowA)">
      <animate attributeName="cx" values="980;900;980" dur="12s" repeatCount="indefinite"/>
    </circle>

    <!-- scanline sweep -->
    <rect x="0" y="0" width="1180" height="2" fill="#22D3EE" opacity="0.12">
      <animate attributeName="y" values="0;360;0" dur="7s" repeatCount="indefinite"/>
    </rect>

    <!-- border shimmer -->
    <rect x="1.5" y="1.5" width="1177" height="357" rx="23" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.6"/>

    <!-- ===== LEFT: ASCII terminal portrait ===== -->
    <g font-family="'JetBrains Mono','Courier New',monospace" font-size="15" fill="url(#accent)">
      <text x="60" y="120" opacity="0"><animate attributeName="opacity" from="0" to="0.95" dur="0.3s" begin="0.3s" fill="freeze"/>   ╔══════════════╗</text>
      <text x="60" y="142" opacity="0"><animate attributeName="opacity" from="0" to="0.95" dur="0.3s" begin="0.5s" fill="freeze"/>   ║  ▄▄▄  ▄▄▄▄▄  ║</text>
      <text x="60" y="164" opacity="0"><animate attributeName="opacity" from="0" to="0.95" dur="0.3s" begin="0.7s" fill="freeze"/>   ║ █   █ █   █  ║</text>
      <text x="60" y="186" opacity="0"><animate attributeName="opacity" from="0" to="0.95" dur="0.3s" begin="0.9s" fill="freeze"/>   ║ █▀▀▀█ █▀▀▄   ║</text>
      <text x="60" y="208" opacity="0"><animate attributeName="opacity" from="0" to="0.95" dur="0.3s" begin="1.1s" fill="freeze"/>   ║ ▀   ▀ ▀  ▀▀ ║</text>
      <text x="60" y="230" opacity="0"><animate attributeName="opacity" from="0" to="0.95" dur="0.3s" begin="1.3s" fill="freeze"/>   ╚══════════════╝</text>
      <text x="60" y="262" font-size="12" fill="#94A3B8" opacity="0"><animate attributeName="opacity" from="0" to="0.8" dur="0.4s" begin="1.5s" fill="freeze"/>   automation.engine --run</text>
    </g>
    <g>
      <line x1="55" y1="80" x2="55" y2="285" stroke="url(#accent)" stroke-width="2" opacity="0.5"/>
    </g>

    <!-- ===== RIGHT: terminal window ===== -->
    <g transform="translate(455,60)">
      <rect x="0" y="0" width="665" height="240" rx="16" fill="url(#panel)" stroke="rgba(255,255,255,0.08)"/>
      <!-- window dots -->
      <circle cx="26" cy="26" r="6" fill="#EF4444"/>
      <circle cx="48" cy="26" r="6" fill="#F59E0B"/>
      <circle cx="70" cy="26" r="6" fill="#10B981"/>
      <text x="330" y="31" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="13" fill="#475569">~/mehmetakifsari — zsh</text>
      <line x1="0" y1="48" x2="665" y2="48" stroke="rgba(255,255,255,0.06)"/>

      <!-- greeting -->
      <text x="30" y="90" font-family="'JetBrains Mono',monospace" font-size="26" font-weight="700" fill="#F8FAFC">
        Hi 👋 I'm <tspan fill="url(#accent)">Mehmet Akif Sarı</tspan>
      </text>

      <!-- typing role line -->
      <text x="30" y="126" font-family="'JetBrains Mono',monospace" font-size="18" fill="#22D3EE">
        <tspan fill="#475569">&gt; </tspan>
        <tspan>Process Automation Developer</tspan>
        <animate attributeName="opacity" values="1;1" dur="1s"/>
      </text>
      <text x="30" y="126" font-family="'JetBrains Mono',monospace" font-size="18" fill="#22D3EE">
        <tspan x="30" dy="0"> </tspan>
        <tspan id="cur">▋</tspan>
      </text>

      <!-- info rows sequential -->
      <g font-family="'JetBrains Mono',monospace" font-size="14">
        <text x="30" y="162" fill="#94A3B8" opacity="0"><animate attributeName="opacity" to="1" dur="0.4s" begin="1.6s" fill="freeze"/><tspan fill="#7C3AED">location</tspan>  İstanbul, Türkiye</text>
        <text x="30" y="186" fill="#94A3B8" opacity="0"><animate attributeName="opacity" to="1" dur="0.4s" begin="1.9s" fill="freeze"/><tspan fill="#7C3AED">focus   </tspan>  n8n · Coolify · WordPress · DevOps</text>
        <text x="30" y="210" fill="#94A3B8" opacity="0"><animate attributeName="opacity" to="1" dur="0.4s" begin="2.2s" fill="freeze"/><tspan fill="#7C3AED">mission </tspan>  manuel süreç → dijital iş akışı</text>
      </g>

      <!-- skill pills -->
      <g font-family="'JetBrains Mono',monospace" font-size="12" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.5s" begin="2.5s" fill="freeze"/>
        <g>
          <rect x="30" y="222" width="70" height="22" rx="11" fill="rgba(34,211,238,0.12)" stroke="#22D3EE" stroke-opacity="0.5"/>
          <text x="65" y="237" text-anchor="middle" fill="#22D3EE">n8n</text>
        </g>
        <g>
          <rect x="108" y="222" width="80" height="22" rx="11" fill="rgba(124,58,237,0.12)" stroke="#7C3AED" stroke-opacity="0.5"/>
          <text x="148" y="237" text-anchor="middle" fill="#A78BFA">Python</text>
        </g>
        <g>
          <rect x="196" y="222" width="80" height="22" rx="11" fill="rgba(16,185,129,0.12)" stroke="#10B981" stroke-opacity="0.5"/>
          <text x="236" y="237" text-anchor="middle" fill="#34D399">Docker</text>
        </g>
        <g>
          <rect x="284" y="222" width="90" height="22" rx="11" fill="rgba(34,211,238,0.12)" stroke="#22D3EE" stroke-opacity="0.5"/>
          <text x="329" y="237" text-anchor="middle" fill="#22D3EE">Coolify</text>
        </g>
        <g>
          <rect x="382" y="222" width="110" height="22" rx="11" fill="rgba(124,58,237,0.12)" stroke="#7C3AED" stroke-opacity="0.5"/>
          <text x="437" y="237" text-anchor="middle" fill="#A78BFA">WordPress</text>
        </g>
        <g>
          <rect x="500" y="222" width="90" height="22" rx="11" fill="rgba(16,185,129,0.12)" stroke="#10B981" stroke-opacity="0.5"/>
          <text x="545" y="237" text-anchor="middle" fill="#34D399">PowerShell</text>
        </g>
      </g>
    </g>

    <!-- blinking cursor overlay -->
    <rect x="770" y="171" width="10" height="18" fill="#22D3EE">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
